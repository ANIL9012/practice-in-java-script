<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>☕ tea & snack · interactive</title>
    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css" />
    <!-- font for clean look -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="scene">
      <div class="table-card">
        <div class="table-top">
          <div class="person" id="person">
            <div class="head">
              <div class="face">
                <div class="eye left-eye"></div>
                <div class="eye right-eye"></div>
                <div class="mouth" id="mouth"></div>
              </div>
              <div class="hair"></div>
            </div>
            <div class="body">
              <div class="arm left-arm" id="left-arm">
                <div class="hand" id="hand-left">
                  <span class="cup-in-hand">
                    <span class="mini-cup">
                      <span class="mini-tea"></span>
                      <span class="mini-handle"></span>
                    </span>
                  </span>
                </div>
              </div>
              <div class="arm right-arm" id="right-arm">
                <div class="hand" id="hand-right">
                  <span class="snack-in-hand">🍪</span>
                </div>
              </div>
              <div class="torso"></div>
            </div>
          </div>

          <div class="plate-area" id="plate-area">
            <div class="plate" id="plate">
              <div class="biscuit b1"></div>
              <div class="biscuit b2"></div>
              <div class="namkeen n1"></div>
              <div class="namkeen n2"></div>
              <div class="namkeen n3"></div>
            </div>
            <div class="label">🍪 biscuit · namkeen</div>
          </div>

          <div class="cup-area" id="cup-area">
            <div class="cup" id="cup-prop">
              <div class="tea-liquid"></div>
              <div class="cup-handle"></div>
              <div class="steam s1"></div>
              <div class="steam s2"></div>
              <div class="steam s3"></div>
            </div>
            <div class="label">☕ chai (extra)</div>
          </div>
        </div>

        <div class="action-bar">
          <span id="action-status">👋 click plate or buttons</span>
          <div class="btn-group">
            <button id="btn-sip">☕ sip tea</button>
            <button id="btn-eat">🍪 eat snack</button>
            <button id="btn-reset">⟲ reset</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>

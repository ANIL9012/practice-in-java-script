<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Calculator</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="calculator"
      role="application"
      aria-label="Professional Calculator"
    >
      <!-- Header -->
      <div class="calc-header">
        <h2><i class="fas fa-calculator"></i> Calculator</h2>
        <span class="badge">PRO</span>
      </div>

      <!-- Display -->
      <div class="display" id="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>

      <!-- Buttons -->
      <div class="buttons" id="buttons">
        <!-- Row 1 -->
        <button
          class="btn btn-function"
          data-action="clear"
          aria-label="Clear all"
        >
          <i class="fas fa-undo-alt"></i> C
        </button>
        <button
          class="btn btn-function"
          data-action="sign"
          aria-label="Toggle sign"
        >
          ±
        </button>
        <button
          class="btn btn-function"
          data-action="percent"
          aria-label="Percent"
        >
          %
        </button>
        <button class="btn btn-operator" data-action="operator" data-value="÷">
          ÷
        </button>

        <!-- Row 2 -->
        <button class="btn" data-action="number" data-value="7">7</button>
        <button class="btn" data-action="number" data-value="8">8</button>
        <button class="btn" data-action="number" data-value="9">9</button>
        <button class="btn btn-operator" data-action="operator" data-value="×">
          ×
        </button>

        <!-- Row 3 -->
        <button class="btn" data-action="number" data-value="4">4</button>
        <button class="btn" data-action="number" data-value="5">5</button>
        <button class="btn" data-action="number" data-value="6">6</button>
        <button class="btn btn-operator" data-action="operator" data-value="−">
          −
        </button>

        <!-- Row 4 -->
        <button class="btn" data-action="number" data-value="1">1</button>
        <button class="btn" data-action="number" data-value="2">2</button>
        <button class="btn" data-action="number" data-value="3">3</button>
        <button class="btn btn-operator" data-action="operator" data-value="+">
          +
        </button>

        <!-- Row 5 -->
        <button class="btn btn-zero" data-action="number" data-value="0">
          0
        </button>
        <button class="btn" data-action="decimal" data-value=".">.</button>
        <button
          class="btn btn-equals"
          data-action="calculate"
          aria-label="Equals"
        >
          <i class="fas fa-equals"></i>
        </button>
      </div>

      <!-- Keyboard hint -->
      <div class="keyboard-hint">
        <span><kbd>⌨</kbd> Keyboard supported</span>
        <span><kbd>Esc</kbd> Clear</span>
        <span><kbd>Enter</kbd> =</span>
      </div>
    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
